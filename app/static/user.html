<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký - Chatbot PTITHCM</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .container { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #666; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; border: none; border-radius: 4px; background: #007bff; color: #fff; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #0056b3; }
        .toggle-link { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
        .toggle-link a { color: #007bff; text-decoration: none; }
        .toggle-link a:hover { text-decoration: underline; }
        .error { color: red; font-size: 0.8rem; margin-top: 0.5rem; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="login-form">
            <h2>Đăng nhập</h2>
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="Nhập email">
            </div>
            <div class="form-group">
                <label for="login-password">Mật khẩu</label>
                <input type="password" id="login-password" placeholder="Nhập mật khẩu">
            </div>
            <button onclick="handleLogin()">Đăng nhập</button>
            <p id="login-error" class="error"></p>
            <div class="toggle-link">
                Chưa có tài khoản? <a href="#" onclick="toggleForm('register')">Đăng ký ngay</a>
            </div>
        </div>

        <div id="register-form" style="display: none;">
            <h2>Đăng ký</h2>
            <div class="form-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" placeholder="Nhập email">
            </div>
            <div class="form-group">
                <label for="reg-password">Mật khẩu</label>
                <input type="password" id="reg-password" placeholder="Nhập mật khẩu (tối thiểu 8 ký tự)">
            </div>
            <div class="form-group">
                <label for="reg-confirm">Xác nhận mật khẩu</label>
                <input type="password" id="reg-confirm" placeholder="Nhập lại mật khẩu">
            </div>
            <button onclick="handleRegister()">Đăng ký</button>
            <p id="reg-error" class="error"></p>
            <div class="toggle-link">
                Đã có tài khoản? <a href="#" onclick="toggleForm('login')">Đăng nhập ngay</a>
            </div>
        </div>
    </div>

    <script>
        function toggleForm(formType) {
            document.getElementById('login-form').style.display = formType === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = formType === 'register' ? 'block' : 'none';
            document.getElementById('login-error').style.display = 'none';
            document.getElementById('reg-error').style.display = 'none';
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorElement = document.getElementById('login-error');

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('token_type', data.token_type);
                    window.location.href = '/chat';
                } else {
                    errorElement.textContent = data.detail || 'Đăng nhập thất bại';
                    errorElement.style.display = 'block';
                }
            } catch (error) {
                errorElement.textContent = 'Đã có lỗi xảy ra';
                errorElement.style.display = 'block';
            }
        }

        async function handleRegister() {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const confirm_password = document.getElementById('reg-confirm').value;
            const errorElement = document.getElementById('reg-error');

            if (password !== confirm_password) {
                errorElement.textContent = 'Mật khẩu xác nhận không khớp';
                errorElement.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, confirm_password })
                });

                const data = await response.json();
                if (response.ok) {
                    alert('Đăng ký thành công! Hãy đăng nhập.');
                    toggleForm('login');
                } else {
                    errorElement.textContent = data.detail || 'Đăng ký thất bại';
                    errorElement.style.display = 'block';
                }
            } catch (error) {
                errorElement.textContent = 'Đã có lỗi xảy ra';
                errorElement.style.display = 'block';
            }
        }
    </script>
</body>
</html>
